# COATER Configuration File
# This file allows easy updates to COATER mappings without modifying code

[TEST_COATERS]
# TEST Data: 8 COATER positions based on wafer order within each XML file
# Each XML file starts fresh with wafer #1
# Base pattern (modify these 8 values to change all mappings):
coater_pattern = 1301,1401,1303,1403,1302,1402,1304,1404

# Wafer order mapping:
# 1st wafer in XML file -> 1301
# 2nd wafer in XML file -> 1401 
# 3rd wafer in XML file -> 1303
# 4th wafer in XML file -> 1403
# 5th wafer in XML file -> 1302
# 6th wafer in XML file -> 1402
# 7th wafer in XML file -> 1304
# 8th wafer in XML file -> 1404
# 9th wafer in XML file -> 1301 (pattern repeats)

[TEST_ENTITY]
# TEST Entity: Hardcoded entity for all TEST data
# Change this value to update the TEST entity for all files
entity = TZJ501

[DECK_MAPPING]
# DECK Mapping: Group coaters into decks for higher-level analysis
# Format: coater = deck
1301 = 13-L
1302 = 13-L  
1303 = 13-R
1304 = 13-R
1401 = 14-L
1402 = 14-L
1403 = 14-R
1404 = 14-R

[POR_COATERS] 
# POR Data: COATER values for slot positions (in order)
# These values will be assigned to slots 1, 2, 3, etc. in order
# You can change these to any values you want
coater_values = 1,2,3

# Example alternative configurations:
# coater_values = A,B,C
# coater_values = COAT1,COAT2,COAT3
# coater_values = Alpha,Beta,Gamma